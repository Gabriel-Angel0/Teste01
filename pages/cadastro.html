<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Alumni UFJF</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <nav>
    <a href="../index.html" class="nav-logo"><div class="nav-logo-mark"></div><div class="nav-logo-text"><strong>Alumni UFJF</strong><span>Cadastro</span></div></a>
    <div class="nav-actions"><a href="../index.html" class="btn btn-sm btn-outline">Voltar</a></div>
  </nav>
  <header class="page-hero"><div class="page-hero-inner"><h1>Cadastro de egresso</h1><p>Preencha seus dados para participar da rede Alumni UFJF.</p></div></header>
  <section><div class="container"><div class="placeholder-card"><form id="form-cadastro"><p><label>Nome completo<br><input required name="nome" style="width:100%;padding:12px;margin:8px 0 16px;border:1px solid #ddd;border-radius:8px"></label></p><p><label>E-mail<br><input required type="email" name="email" style="width:100%;padding:12px;margin:8px 0 16px;border:1px solid #ddd;border-radius:8px"></label></p><p><label>Curso<br><input required name="curso" style="width:100%;padding:12px;margin:8px 0 16px;border:1px solid #ddd;border-radius:8px"></label></p><p><label>Ano de formatura<br><input required name="ano" style="width:100%;padding:12px;margin:8px 0 16px;border:1px solid #ddd;border-radius:8px"></label></p><button class="btn btn-md btn-primary" type="submit">Enviar cadastro</button></form><p id="mensagem" style="margin-top:16px;color:var(--ufjf-green);font-weight:600"></p></div></div></section>
  <script src="../assets/js/main.js" defer></script>
</body>
</html>
