<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando - Conexões UFJF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body{min-height:100vh;background:radial-gradient(circle at 15% 10%,rgba(0,132,178,.32),transparent 28%),radial-gradient(circle at 85% 8%,rgba(255,207,64,.18),transparent 25%),linear-gradient(135deg,#050b18 0%,#071827 48%,#051b18 100%);color:white;display:flex;align-items:center;justify-content:center;padding:24px}.redirect-card{max-width:680px;background:linear-gradient(160deg,rgba(255,255,255,.14),rgba(255,255,255,.065));border:1px solid rgba(255,255,255,.17);border-radius:34px;padding:38px;box-shadow:0 28px 90px rgba(0,0,0,.38);backdrop-filter:blur(20px);text-align:center}.redirect-card h1{font-family:'DM Serif Display',serif;font-size:42px;margin-bottom:12px}.redirect-card p{color:#dbeafe;line-height:1.7}.redirect-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}
  </style>
</head>
<body>
  <main class="redirect-card">
    <h1>Redirecionando...</h1>
    <p>Estamos abrindo a área correta da plataforma Conexões UFJF.</p>
    <div class="redirect-actions">
      <a class="btn btn-sm btn-primary" href="dashboard-placement.html">Área Placement</a>
      <a class="btn btn-sm btn-primary" href="dashboard-alumni.html">Área Alumni</a>
      <a class="btn btn-sm btn-primary" href="dashboard-parceiro.html">Área Parceiro</a>
    </div>
  </main>

  <script>
    const destino = sessionStorage.getItem('dashboardDestinoConexoesUfjf');
    if (destino) {
      sessionStorage.removeItem('dashboardDestinoConexoesUfjf');
      window.location.replace(destino);
    } else {
      setTimeout(() => window.location.replace('dashboard-alumni.html'), 900);
    }
  </script>
</body>
</html>
